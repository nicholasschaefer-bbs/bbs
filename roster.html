<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badger Boys State — Citizen Roster</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #fff; --border: #e2e0d8;
  --text: #1a1916; --muted: #8a8880; --accent: #1a1916;
  --success: #2d6a4f; --success-bg: #d8f3dc;
  --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.site-header { background: var(--yale); border-bottom: 4px solid var(--gold); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.site-header h1 { font-family: var(--condensed); font-size: 24px; font-weight: 700; letter-spacing: 0.06em; color: var(--white); text-transform: uppercase; }
.site-header .label { font-family: var(--condensed); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 600; }
.citizen-count { font-family: var(--condensed); font-size: 13px; color: rgba(255,255,255,0.7); letter-spacing: 0.06em; text-transform: uppercase; }

/* Filters */
.filters { background: var(--surface); border-bottom: 3px solid var(--border); padding: 1rem 2rem; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 11px; color: var(--yale); font-family: var(--condensed); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
.filter-group select, .filter-group input { font-family: var(--sans); font-size: 13px; padding: 6px 10px; border: 2px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); outline: none; min-width: 140px; }
.filter-group select:focus, .filter-group input:focus { border-color: var(--steel); }
.filter-reset { font-size: 13px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 6px 4px; margin-top: 16px; text-decoration: underline; font-family: var(--sans); }
.filter-reset:hover { color: var(--yale); }

/* Grid */
.roster-wrap { padding: 2rem; }
.roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

/* Card */
.citizen-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: box-shadow 0.15s, transform 0.15s; }
.citizen-card:hover { box-shadow: 0 4px 20px rgba(0,70,127,0.15); transform: translateY(-2px); }

.card-photo { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--bg); }
.card-photo-placeholder { width: 100%; aspect-ratio: 1; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.card-photo-placeholder .initials { font-size: 32px; font-weight: 300; color: var(--border); }

.card-body { padding: 14px; }
.card-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
.card-meta { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
.card-meta span { display: block; }

.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.tag { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); background: var(--bg); }
.tag.party-democrat { border-color: #b5c9e8; color: #1a4a8a; background: #edf2fb; }
.tag.party-republican { border-color: #f0b5b5; color: #8a1a1a; background: #fbeaea; }
.tag.party-independent { border-color: #c8e0c0; color: #2d6a1a; background: #edf7ea; }
.tag.file-id { border-color: var(--border); color: var(--muted); }

/* Audio player */
.card-audio { width: 100%; }
.audio-btn { width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 2px solid var(--border); border-radius: 7px; background: var(--bg); cursor: pointer; font-family: var(--condensed); font-size: 13px; color: var(--muted); transition: all 0.15s; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.audio-btn:hover { border-color: var(--yale); color: var(--yale); background: var(--surface); }
.audio-btn.playing { border-color: var(--steel); color: var(--steel); background: var(--success-bg); }
.audio-btn .play-icon { width: 24px; height: 24px; border-radius: 50%; background: var(--yale); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.audio-btn.playing .play-icon { background: var(--steel); }
.audio-btn .play-icon svg { width: 10px; height: 10px; fill: white; }
.audio-no { font-size: 11px; color: var(--border); font-family: var(--condensed); text-transform: uppercase; letter-spacing: 0.06em; }

/* Empty / loading states */
.state-msg { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.state-msg h2 { font-family: var(--condensed); font-size: 22px; font-weight: 700; color: var(--yale); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
.state-msg p { font-size: 14px; }
.spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 4rem; color: var(--muted); font-size: 14px; font-family: var(--condensed); text-transform: uppercase; letter-spacing: 0.08em; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--yale); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .site-header, .filters, .roster-wrap { padding-left: 1rem; padding-right: 1rem; }
  .roster-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
}
</style>
</head>
<body>

<script>
// ── CONFIGURATION ──────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxM5eY02cy7tPnIxnrsOPzMzZEvt8hYdbAu8lRQx-Sk-9W9M_kIUeFNejPLn9H4DtWr4A/exec';
// ───────────────────────────────────────────────────────────
</script>

<header class="site-header">
  <div>
    <div class="label">Badger Boys State</div>
    <h1>Citizen Roster</h1>
  </div>
  <div class="citizen-count" id="citizen-count"></div>
</header>

<div class="filters">
  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="filter-search" placeholder="Name, school...">
  </div>
  <div class="filter-group">
    <label>County</label>
    <select id="filter-county"><option value="">All counties</option></select>
  </div>
  <div class="filter-group">
    <label>City</label>
    <select id="filter-city"><option value="">All cities</option></select>
  </div>
  <div class="filter-group">
    <label>Party</label>
    <select id="filter-party"><option value="">All parties</option></select>
  </div>
  <button class="filter-reset" id="filter-reset">Reset filters</button>
</div>

<div class="roster-wrap">
  <div id="roster-loading" class="spinner-wrap">
    <div class="spinner"></div> Loading citizens...
  </div>
  <div id="roster-error" class="state-msg" style="display:none;">
    <h2>Could not load roster</h2>
    <p id="roster-error-msg"></p>
  </div>
  <div id="roster-empty" class="state-msg" style="display:none;">
    <h2>No citizens match</h2>
    <p>Try adjusting your filters.</p>
  </div>
  <div class="roster-grid" id="roster-grid" style="display:none;"></div>
</div>

<script>
(function() {
  var allCitizens = [];
  var currentAudio = null;
  var currentBtn   = null;

  var grid        = document.getElementById('roster-grid');
  var loading     = document.getElementById('roster-loading');
  var errorDiv    = document.getElementById('roster-error');
  var errorMsg    = document.getElementById('roster-error-msg');
  var emptyDiv    = document.getElementById('roster-empty');
  var countEl     = document.getElementById('citizen-count');
  var searchEl    = document.getElementById('filter-search');
  var countyEl    = document.getElementById('filter-county');
  var cityEl      = document.getElementById('filter-city');
  var partyEl     = document.getElementById('filter-party');
  var resetBtn    = document.getElementById('filter-reset');

  // Load data
  fetch(SCRIPT_URL + '?action=roster')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      allCitizens = data.citizens || [];
      loading.style.display = 'none';
      populateFilters();
      render();
    })
    .catch(function(err) {
      loading.style.display = 'none';
      errorDiv.style.display = 'block';
      errorMsg.textContent = err.message || 'Unknown error. Check your Apps Script URL.';
    });

  function populateFilters() {
    var counties = {}, cities = {}, parties = {};
    allCitizens.forEach(function(c) {
      if (c['County']) counties[c['County']] = 1;
      if (c['City'])   cities[c['City']]     = 1;
      if (c['Party'])  parties[c['Party']]   = 1;
    });
    populate(countyEl, Object.keys(counties).sort(), 'All counties');
    populate(cityEl,   Object.keys(cities).sort(),   'All cities');
    populate(partyEl,  Object.keys(parties).sort(),  'All parties');
  }

  function populate(sel, vals, placeholder) {
    sel.innerHTML = '<option value="">' + placeholder + '</option>';
    vals.forEach(function(v) {
      var o = document.createElement('option');
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  }

  function getFiltered() {
    var q       = searchEl.value.trim().toLowerCase();
    var county  = countyEl.value;
    var city    = cityEl.value;
    var party   = partyEl.value;
    return allCitizens.filter(function(c) {
      if (county && c['County'] !== county) return false;
      if (city   && c['City']   !== city)   return false;
      if (party  && c['Party']  !== party)  return false;
      if (q) {
        var hay = [c['First'], c['Last'], c['High School'], c['City'], c['County']].join(' ').toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });
  }

  function render() {
    var citizens = getFiltered();
    countEl.textContent = citizens.length + ' citizen' + (citizens.length !== 1 ? 's' : '');
    grid.style.display    = 'none';
    emptyDiv.style.display = 'none';
    if (!citizens.length) { emptyDiv.style.display = 'block'; return; }
    grid.innerHTML = '';
    citizens.forEach(function(c) { grid.appendChild(makeCard(c)); });
    grid.style.display = 'grid';
  }

  function makeCard(c) {
    var first = c['First'] || '';
    var last  = c['Last']  || '';
    var name  = (first + ' ' + last).trim() || 'Unknown';
    var initials = ((first[0] || '') + (last[0] || '')).toUpperCase() || '?';
    var school = c['High School'] || '';
    var city   = c['City']   || '';
    var county = c['County'] || '';
    var party  = c['Party']  || '';
    var fileId = c['File ID'] || '';

    var card = document.createElement('div');
    card.className = 'citizen-card';

    // Photo
    var photoWrap = document.createElement('div');
    photoWrap.innerHTML = '<div class="card-photo-placeholder"><span class="initials">' + initials + '</span></div>';
    if (c.photoId) {
      var img = document.createElement('img');
      img.className = 'card-photo';
      img.alt = name;
      img.style.display = 'none';
      photoWrap.appendChild(img);
      (function(pid, i, pw) {
        var cacheKey = 'photo_' + pid;
        var cached = null;
        try { cached = sessionStorage.getItem(cacheKey); } catch(e) {}
        function showImg(dataUrl) {
          i.src = dataUrl;
          i.style.display = 'block';
          var ph = pw.querySelector('.card-photo-placeholder');
          if (ph) ph.style.display = 'none';
        }
        if (cached) { showImg(cached); return; }
        fetch(SCRIPT_URL + '?action=file&id=' + pid)
          .then(function(r) { return r.json(); })
          .then(function(json) {
            var dataUrl = 'data:' + json.mimeType + ';base64,' + json.data;
            try { sessionStorage.setItem(cacheKey, dataUrl); } catch(e) {}
            showImg(dataUrl);
          })
          .catch(function() {});
      })(c.photoId, img, photoWrap);
    }
    card.appendChild(photoWrap);

    // Body
    var body = document.createElement('div');
    body.className = 'card-body';

    body.innerHTML = '<div class="card-name">' + esc(name) + '</div>' +
      '<div class="card-meta">' +
        (school ? '<span>' + esc(school) + '</span>' : '') +
        (city || county ? '<span>' + [city, county].filter(Boolean).map(esc).join(', ') + '</span>' : '') +
      '</div>';

    // Tags
    var tags = '';
    if (fileId) tags += '<span class="tag file-id">#' + esc(fileId) + '</span>';
    if (party)  tags += '<span class="tag party-' + party.toLowerCase().replace(/\s+/g,'-') + '">' + esc(party) + '</span>';
    if (tags) body.innerHTML += '<div class="card-tags">' + tags + '</div>';

    // Audio
    var audioWrap = document.createElement('div');
    audioWrap.className = 'card-audio';
    if (c.audioId) {
      var btn = document.createElement('button');
      btn.className = 'audio-btn';
      btn.innerHTML = '<span class="play-icon"><svg viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg></span><span class="audio-label">Hear name</span>';
      (function(audioId, b) {
        b.addEventListener('click', function() { playAudio(audioId, b); });
      })(c.audioId, btn);
      audioWrap.appendChild(btn);
    } else {
      audioWrap.innerHTML = '<span class="audio-no">No recording</span>';
    }
    body.appendChild(audioWrap);
    card.appendChild(body);
    return card;
  }

  function stopCurrent() {
    if (currentAudio && !currentAudio.paused) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }
    if (currentBtn) {
      currentBtn.classList.remove('playing');
      currentBtn.querySelector('.audio-label').textContent = 'Hear name';
    }
  }

  function playAudio(audioId, btn) {
    var isSame = currentBtn === btn;
    stopCurrent();
    currentAudio = null; currentBtn = null;
    if (isSame) return;

    btn.querySelector('.audio-label').textContent = 'Loading...';

    var cacheKey = 'audio_' + audioId;
    var cached = null;
    try { cached = sessionStorage.getItem(cacheKey); } catch(e) {}

    function playDataUrl(dataUrl) {
      var audio = new Audio(dataUrl);
      audio.play().then(function() {
        btn.classList.add('playing');
        btn.querySelector('.audio-label').textContent = 'Playing...';
        currentAudio = audio; currentBtn = btn;
      }).catch(function() {
        btn.querySelector('.audio-label').textContent = 'Error';
      });
      audio.onended = function() {
        btn.classList.remove('playing');
        btn.querySelector('.audio-label').textContent = 'Hear name';
        currentAudio = null; currentBtn = null;
      };
    }

    if (cached) { playDataUrl(cached); return; }

    fetch(SCRIPT_URL + '?action=audio&id=' + audioId)
      .then(function(r) { return r.json(); })
      .then(function(json) {
        var dataUrl = 'data:' + json.mimeType + ';base64,' + json.data;
        try { sessionStorage.setItem(cacheKey, dataUrl); } catch(e) {}
        playDataUrl(dataUrl);
      })
      .catch(function() {
        btn.querySelector('.audio-label').textContent = 'Error';
      });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Filter events
  [searchEl, countyEl, cityEl, partyEl].forEach(function(el) {
    el.addEventListener('input', render);
    el.addEventListener('change', render);
  });
  resetBtn.addEventListener('click', function() {
    searchEl.value = ''; countyEl.value = ''; cityEl.value = ''; partyEl.value = '';
    render();
  });

})();
</script>

  Replace your entire Apps Script code with the code in

</body>
</html>
